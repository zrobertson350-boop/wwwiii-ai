<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — WWWIII</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="/shared.js" defer></script>
<style>
.profile-wrap{max-width:700px;margin:0 auto;padding:120px 24px 80px}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;margin-bottom:32px}
.profile-avatar{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent);margin:0 auto 16px;
  background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--muted);overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:var(--sans);font-size:24px;font-weight:700;margin-bottom:4px}
.profile-bio{color:var(--muted);font-size:14px;max-width:400px;margin:8px auto 16px;line-height:1.6}
.profile-stats{display:flex;justify-content:center;gap:32px;margin-top:16px}
.profile-stat{text-align:center}
.profile-stat-val{font-family:var(--sans);font-size:20px;font-weight:700;color:var(--ink)}
.profile-stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.contrib-list{margin-top:8px}
.contrib-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.contrib-item:last-child{border-bottom:none}
.contrib-title{font-size:14px;font-weight:500}
.contrib-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-orb"></div>
<nav id="mainNav"></nav>

<div class="profile-wrap" id="profileContent">
  <div class="spinner" style="padding:80px 0"></div>
</div>

<footer id="mainFooter"></footer>

<script>
async function loadProfile() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) return window.location.href = '/community.html';
  const container = document.getElementById('profileContent');

  try {
    const res = await fetch(`/api/community/profile/${id}`);
    if (!res.ok) throw new Error();
    const p = await res.json();

    document.title = (p.display_name || 'Profile') + ' — WWWIII';

    container.innerHTML = `
      <div class="profile-card">
        <div class="profile-avatar">
          ${p.avatar_url ? `<img src="${p.avatar_url}">` : (p.display_name?.[0]?.toUpperCase() || '?')}
        </div>
        <div class="profile-name">${p.display_name || 'Anonymous'}</div>
        ${p.tier && p.tier !== 'none' ? `<span class="badge badge-accent" style="margin:8px 0">${p.tier}</span>` : ''}
        ${p.bio ? `<div class="profile-bio">${p.bio}</div>` : ''}
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px">
          Joined ${new Date(p.joined_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
        </div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-val">${(p.token_balance || 0).toLocaleString()}</div>
            <div class="profile-stat-label">Tokens</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val">${p.contributions?.length || 0}</div>
            <div class="profile-stat-label">Contributions</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val">${p.discussion_count || 0}</div>
            <div class="profile-stat-label">Discussions</div>
          </div>
        </div>
      </div>

      ${p.contributions?.length > 0 ? `
        <div class="section-tag">Contributions</div>
        <div class="contrib-list">
          ${p.contributions.map(c => `
            <div class="contrib-item">
              <div>
                <div class="contrib-title">${c.title}</div>
                <div class="contrib-meta">${c.type} &middot; ${timeAgo(c.created_at)}</div>
              </div>
              <span class="badge badge-green">+${c.tokens_awarded} tokens</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
  } catch {
    container.innerHTML = '<div class="empty-state"><h3>Profile not found</h3><p><a href="/community.html">Back to community</a></p></div>';
  }
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
